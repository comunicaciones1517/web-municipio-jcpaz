<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Red de Salud Municipal — José C. Paz</title>

  <!-- Tipografía Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- MapLibre GL JS — biblioteca de mapas open-source -->
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">

  <style>
    /* ============================================================
       VARIABLES DE COLOR Y DISEÑO
       Para cambiar la paleta, editá solo estas líneas.
    ============================================================ */
    :root {
      --bg:        #060810;
      --sidebar:   #080a12;
      --surface:   #0e1322;
      --border:    #131b2e;
      --caps:      #00c878;
      --hosp:      #3c82ff;
      --samu:      #ff3b3b;
      --text:      #c8d8e8;
      --muted:     #3a5068;
      --juzgado:   #a78bfa;
      --cementerio:#94a3b8;
      --social:    #f97316;
      --educacion: #92400e;
      --topbar-h:  52px;
      --sidebar-w: 268px;
    }

    [data-theme="light"] {
      --bg:        #f0f4f8;
      --sidebar:   #ffffff;
      --surface:   #e8eef4;
      --border:    #cbd5e1;
      --text:      #1e293b;
      --muted:     #64748b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
    }

    /* ============================================================
       TOPBAR
    ============================================================ */
    #topbar {
      position: fixed;
      inset: 0 0 auto 0;
      height: var(--topbar-h);
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      z-index: 300;
    }

    /* Logo */
    #logo {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      text-decoration: none;
      user-select: none;
    }

    #logo-svg {
      width: 160px;
      height: 44px;
      flex-shrink: 0;
    }

    #logo-text span {
      display: block;
      font-size: 10px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Buscador */
    #search-wrap {
      flex: 1;
      max-width: 400px;
      position: relative;
    }
    #search-ico {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 7px 12px 7px 32px;
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color .18s;
    }
    #search:focus        { border-color: var(--caps); }
    #search::placeholder { color: var(--muted); }

    /* Chip SAMU */
    #samu-chip {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,59,59,.08);
      border: 1px solid rgba(255,59,59,.2);
      border-radius: 9px;
      padding: 6px 14px;
      text-decoration: none;
      transition: background .18s;
      flex-shrink: 0;
    }
    #samu-chip:hover { background: rgba(255,59,59,.14); }
    .samu-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--samu);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    #samu-chip .sl { font-size:13px; font-weight:700; color:#ff6060; }
    #samu-chip .ss { font-size:10px; color:rgba(255,96,96,.45); text-transform:uppercase; letter-spacing:.05em; }

    /* ============================================================
       LAYOUT
    ============================================================ */
    #main {
      position: fixed;
      top: var(--topbar-h);
      bottom: 0; left: 0; right: 0;
      display: flex;
    }

    /* ============================================================
       SIDEBAR
    ============================================================ */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .25s cubic-bezier(.4,0,.2,1);
    }
    #sidebar.collapsed {
      width: 0;
      border-right: none;
    }

    /* Botón toggle sidebar */
    #sidebar-toggle {
      position: absolute;
      top: 50%;
      left: var(--sidebar-w);
      transform: translateY(-50%);
      z-index: 200;
      width: 28px;
      height: 64px;
      background: var(--caps);
      border: none;
      border-radius: 0 10px 10px 0;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: left .25s cubic-bezier(.4,0,.2,1), opacity .14s;
      padding: 0;
      flex-shrink: 0;
      opacity: .85;
      box-shadow: 3px 0 12px rgba(0,200,120,.25);
    }
    #sidebar-toggle:hover { opacity: 1; }
    #sidebar-toggle.collapsed { left: 0; }
    #sidebar-toggle svg { transition: transform .25s; }
    #sidebar-toggle.collapsed svg { transform: rotate(180deg); }

    /* Panel de filtros */
    #filter-panel {
      padding: 14px 12px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      padding-left: 2px;
    }
    #filters { display: flex; flex-direction: column; gap: 3px; }

    .fbtn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 7px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: background .13s, color .13s, border-color .13s;
    }
    .fbtn:hover  { background: var(--surface); color: var(--text); }
    .fbtn.on     { background: var(--surface); color: var(--text); border-color: var(--border); }

    .fdot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: .35;
      transition: opacity .13s;
    }
    .fbtn.on .fdot { opacity: 1; }

    .fdot-caps  { background: var(--caps); }
    .fdot-hosp  { background: var(--hosp); }
    .fdot-guard { background: #ff9500; }
    .fdot-ped   { background: #be5ff5; }
    .fdot-od    { background: #32ade6; }
    .fdot-ofic  { background: #06b6d4; }
    .fdot-seg   { background: #ef4444; }
    .fdot-juz   { background: #a78bfa; }
    .fdot-cem   { background: #94a3b8; }
    .fdot-soc   { background: #f97316; }
    .fdot-edu   { background: #92400e; }

    .fcount {
      margin-left: auto;
      font-size: 10px;
      background: var(--bg);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      min-width: 20px;
      text-align: center;
    }

    /* Panel de lista */
    #list-panel {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    #list-panel::-webkit-scrollbar       { width: 3px; }
    #list-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .list-group-label {
      padding: 12px 14px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      position: sticky;
      top: 0;
      background: var(--sidebar);
    }

    /* Item de lista */
    .ci {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 10px;
      margin: 2px 6px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .13s;
    }
    .ci:hover  { background: var(--surface); }
    .ci.active { background: var(--surface); outline: 1px solid var(--border); }

    /* Ícono cuadrado izquierdo */
    .ci-ico {
      width: 30px; height: 30px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .ci-ico-hosp { background: rgba(46,128,255,.12); border: 1px solid rgba(46,128,255,.2); }
    .ci-ico-caps { background: rgba(0,223,138,.10); border: 1px solid rgba(0,223,138,.18); }

    .ci-body { flex: 1; min-width: 0; }
    .ci-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ci-addr {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ci-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .badge-caps { background: rgba(0,223,138,.12); color: var(--caps); }
    .badge-hosp { background: rgba(46,128,255,.12); color: var(--hosp); }

    #list-empty {
      padding: 28px 16px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      display: none;
    }

    /* ============================================================
       CONTENEDOR DEL MAPA
    ============================================================ */
    #map-wrap {
      position: relative;
      flex: 1;
      background: var(--bg);
    }

    /* El mapa MapLibre ocupa todo el espacio */
    #map { position: absolute; inset: 0; }

    /* Canvas de animación (beams + partículas) — encima del mapa, sin bloquear clicks */
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Controles de zoom personalizados */
    .maplibregl-ctrl-group {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      border-radius: 9px !important;
      overflow: hidden;
      box-shadow: none !important;
    }
    .maplibregl-ctrl-group button {
      background: var(--surface) !important;
      color: var(--muted) !important;
      width: 32px !important;
      height: 32px !important;
      transition: background .13s !important;
    }
    .maplibregl-ctrl-group button:hover { background: var(--border) !important; color: var(--text) !important; }
    .maplibregl-ctrl-group button + button { border-top: 1px solid var(--border) !important; }
    .maplibregl-ctrl-attrib {
      font-size: 9px !important;
      opacity: .3 !important;
      background: rgba(3,6,15,.7) !important;
    }

    /* ============================================================
       PILL DE RESULTADOS
    ============================================================ */
    #results-pill {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(7,11,22,.88);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      color: var(--muted);
      z-index: 30;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ============================================================
       MARCADORES ANIMADOS
       La animación se aplica al elemento SVG dentro del marcador.
       .selected activa el pulso más grande.
    ============================================================ */
    .mwrap {
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .mwrap svg { overflow: visible; display: block; }

    /* Anillo pulsante exterior */
    .pr {
      transform-origin: center;
      animation: pr-std 2.8s ease-out infinite;
    }
    .pr2 {
      transform-origin: center;
      animation: pr-std 2.8s ease-out infinite .75s;
    }
    @keyframes pr-std {
      0%   { opacity:.75; transform:scale(.45); }
      75%  { opacity:0;   transform:scale(2.2); }
      100% { opacity:0;   transform:scale(2.2); }
    }

    /* Pulso ampliado cuando está seleccionado */
    .mwrap.selected .pr  { animation: pr-sel 1.9s ease-out infinite; }
    .mwrap.selected .pr2 { animation: pr-sel 1.9s ease-out infinite .48s; }
    @keyframes pr-sel {
      0%   { opacity:1;  transform:scale(.45); }
      75%  { opacity:0;  transform:scale(3.2); }
      100% { opacity:0;  transform:scale(3.2); }
    }

    /* ============================================================
       TARJETA FLOTANTE
    ============================================================ */
    #card {
      position: absolute;
      bottom: 28px;
      right: 24px;
      width: 306px;
      background: var(--sidebar);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      z-index: 50;
      display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,.55);
    }
    #card.vis {
      display: block;
      animation: card-up .22s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes card-up {
      from { opacity:0; transform:translateY(12px) scale(.97); }
      to   { opacity:1; transform:translateY(0)    scale(1);   }
    }

    /* Encabezado de la tarjeta */
    #card-eyebrow {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    #card-type-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    #card-type-lbl { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; }

    #card-name {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .card-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .card-row svg { flex-shrink: 0; margin-top: 1px; }

    /* Indicador abierto/cerrado */
    #card-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .status-open   { background: rgba(0,223,138,.12); color: var(--caps); }
    .status-closed { background: rgba(100,130,160,.10); color: var(--muted); }
    .status-dot    { width:5px; height:5px; border-radius:50%; background:currentColor; }

    /* Divisor */
    #card-div { height:1px; background:var(--border); margin:14px 0; }

    /* Servicios */
    #card-services-label { font-size:10px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
    #card-services-text  { font-size:12px; color:var(--muted); line-height:1.6; }

    /* Acciones */
    #card-footer { display:flex; gap:8px; margin-top:16px; }
    #card-dir {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 0;
      background: var(--caps);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .14s;
    }
    #card-dir:hover { opacity:.84; }
    #card-close {
      width: 36px; height: 36px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      display: grid;
      place-items: center;
      font-family: inherit;
      flex-shrink: 0;
      transition: color .14s;
    }
    #card-close:hover { color: var(--text); }

    /* ============================================================
       MISC
    ============================================================ */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    /* ============================================================
       BOTÓN GPS (topbar)
    ============================================================ */
    #gps-btn {
      width: 36px; height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: background .14s, color .14s, border-color .14s;
    }
    #gps-btn:hover        { background: var(--border); color: var(--text); }
    #gps-btn.active       { background: rgba(60,130,255,.12); border-color: rgba(60,130,255,.35); color: var(--hosp); }
    #gps-btn.manual       { background: rgba(0,200,120,.12); border-color: rgba(0,200,120,.35); color: var(--caps); }
    #gps-btn.searching    { animation: gps-pulse 1.2s ease-in-out infinite; }
    @keyframes gps-pulse  { 0%,100%{opacity:1} 50%{opacity:.4} }

    #theme-btn {
      width: 36px; height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--muted);
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: background .14s, color .14s, border-color .14s;
    }
    #theme-btn:hover { background: var(--border); color: var(--text); }

    /* Modo manual: cursor crosshair sobre el mapa */
    #map-wrap.manual-mode         { cursor: crosshair; }
    #map-wrap.manual-mode #map    { cursor: crosshair; }

    /* Banner de instrucción manual */
    #manual-banner {
      position: absolute;
      top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,200,120,.15);
      border: 1px solid rgba(0,200,120,.4);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 12px;
      font-weight: 600;
      color: var(--caps);
      z-index: 100;
      white-space: nowrap;
      display: none;
      pointer-events: none;
    }
    #manual-banner.vis { display: block; }

    /* ============================================================
       BOTONES DE NAVEGACIÓN en la tarjeta
    ============================================================ */
    #card-footer { display:flex; gap:8px; margin-top:16px; flex-wrap: wrap; }

    .nav-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .14s, background .14s, border-color .14s;
      min-width: 80px;
    }
    .nav-btn:hover   { opacity: .84; }
    .nav-btn.active  { outline: 2px solid currentColor; outline-offset: 1px; }

    .nav-btn-walk  { background: rgba(0,200,120,.1);  color: var(--caps); border-color: rgba(0,200,120,.25); }
    .nav-btn-drive { background: rgba(60,130,255,.1); color: var(--hosp); border-color: rgba(60,130,255,.25); }

    /* ============================================================
       PANEL DE RUTA (parte inferior del mapa)
    ============================================================ */
    #nav-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: var(--sidebar);
      border-top: 1px solid var(--border);
      z-index: 60;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.34,1.2,.64,1);
      max-height: 45%;
      display: flex;
      flex-direction: column;
    }
    #nav-panel.vis { transform: translateY(0); }

    #nav-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #nav-mode-icon { font-size: 18px; }
    #nav-summary   { flex: 1; }
    #nav-duration  { font-size: 15px; font-weight: 700; color: var(--text); }
    #nav-meta      { font-size: 11px; color: var(--muted); margin-top: 1px; }

    #nav-tabs {
      display: flex;
      gap: 6px;
    }
    .nav-tab {
      padding: 5px 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all .13s;
    }
    .nav-tab.on-walk  { background: rgba(0,200,120,.12);  color: var(--caps); border-color: rgba(0,200,120,.3); }
    .nav-tab.on-drive { background: rgba(60,130,255,.12); color: var(--hosp); border-color: rgba(60,130,255,.3); }

    #nav-close {
      width: 30px; height: 30px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: color .14s;
    }
    #nav-close:hover { color: var(--text); }

    /* Pasos de la ruta */
    #nav-steps {
      overflow-y: auto;
      padding: 10px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #nav-steps::-webkit-scrollbar { width: 3px; }
    #nav-steps::-webkit-scrollbar-thumb { background: var(--border); }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      background: var(--bg);
      border-radius: 7px;
      border-left: 3px solid transparent;
    }
    .step-walk  { border-left-color: var(--caps); }
    .step-drive { border-left-color: var(--hosp); }

    .step-ico  { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .step-txt  { font-size: 12px; color: var(--text); flex: 1; line-height: 1.4; }
    .step-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }

    /* Notificación flotante */
    #notif {
      position: absolute;

  ─────────────────────────
  Editá  data/centros.json  y copiá el bloque de cualquier centro.
  Campos obligatorios:

    "id"           → texto único sin espacios (ej: "caps-nuevo")
    "nombre"       → nombre completo
    "tipo"         → "caps"  o  "hospital"
    "lat"          → latitud negativa  (ej: -34.5200)
    "lng"          → longitud negativa (ej: -58.7600)
    "direccion"    → dirección postal
    "horario"      → texto libre  (ej: "Lun–Vie 8:00–18:00 hs")
    "diasHorario"  → "L-V"  /  "L-S"  /  "24h"
    "horarioDesde" → "HH:MM"  (ej: "07:00")
    "horarioHasta" → "HH:MM"  (ej: "19:00")
    "servicios"    → ["Clínica", "Pediatría", ...]
    "guardia24h"   → true  o  false

  Coordenadas: abrí Google Maps, click derecho → Copiar coordenadas.

  MAPA:
  ──────
  Usa tiles de CartoDB Dark Matter (libres, sin API key).
  El filtro CSS aplicado al canvas WebGL lo convierte al color teal.
  ================================================================
*/

────────────────────────────────── */

const MAP_FILTER = 'sepia(1) hue-rotate(195deg) saturate(2.6) brightness(1.05) contrast(1.05)';

────────────────────────────────── */

────────────────────────────────── */

    sources: {
      carto: {

          'https://b.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png',

  },
  center:   CFG.center,

  minZoom:  CFG.minZoom,
  maxZoom:  CFG.maxZoom,
  pitchWithRotate: false,
  dragRotate:      false,
  touchPitch:      false,
  attributionControl: false
});

/* Atribución requerida por licencia OSM */
map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');

/* Controles de zoom (sin compás) */
map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

  map.getCanvas().style.filter = MAP_FILTER;

function loadCentros() {
  centros = CENTROS_DATA;
  actualizarContadores();
  renderTodo();
}

function actualizarContadores() {
  q('cnt-caps').textContent   = centros.filter(c => c.tipo === 'caps').length;
  q('cnt-hosp').textContent   = centros.filter(c => c.tipo === 'hospital').length;
  q('cnt-ofic').textContent   = centros.filter(c => c.tipo === 'oficina').length;
  q('cnt-seg').textContent    = centros.filter(c => c.tipo === 'seguridad').length;
  q('cnt-juz').textContent    = centros.filter(c => c.tipo === 'juzgado').length;
  q('cnt-cem').textContent    = centros.filter(c => c.tipo === 'cementerio').length;
  q('cnt-soc').textContent    = centros.filter(c => c.tipo === 'social').length;
  q('cnt-edu').textContent    = centros.filter(c => c.tipo === 'educacion').length;
}

function tieneSrv(c, kw) {
  return c.servicios.some(s => s.toLowerCase().includes(kw.toLowerCase()));
}


/* ──────────────────────────────────
   FILTRADO
────────────────────────────────── */
function filtrados() {
  const tipos   = ['caps','hospital','oficina','seguridad','juzgado','cementerio','social','educacion'].filter(t => activeF.has(t));
  const guard   = activeF.has('guardia24h');
  const ped     = activeF.has('pediatria');
  const od      = activeF.has('odontologia');
  const haySrv  = guard || ped || od;

  return centros.filter(c => {
    /* El municipio siempre se muestra, no está sujeto a filtros */
    if (c.tipo === 'municipio') {
      if (searchQ) {
        const q = searchQ.toLowerCase();
        return c.nombre.toLowerCase().includes(q) || c.direccion.toLowerCase().includes(q);
      }
      return true;
    }
    /* Búsqueda textual */
    if (searchQ) {
      const q = searchQ.toLowerCase();
      const ok = c.nombre.toLowerCase().includes(q)    ||
                 c.direccion.toLowerCase().includes(q)  ||
                 c.servicios.some(s => s.toLowerCase().includes(q));
      if (!ok) return false;
    }
    /* Tipo */
    if (tipos.length > 0 && !tipos.includes(c.tipo)) return false;
    /* Servicio */
    if (haySrv) {
      const ok = (guard && c.guardia24h)         ||
                 (ped  && tieneSrv(c,'pediatría'))||
                 (od   && tieneSrv(c,'odontología'));
      if (!ok) return false;
    }
    return true;
  });
}


/* ──────────────────────────────────
   RENDER GENERAL
────────────────────────────────── */
function renderTodo() {
  const f = filtrados();
  renderLista(f);
  renderMarcadores(f);
  const pill = q('results-pill');
  pill.textContent = f.length === 0 ? 'Sin resultados'
    : f.length === 1 ? '1 centro encontrado'
    : `${f.length} centros encontrados`;
}


/* ──────────────────────────────────
   LISTA — sidebar con secciones separadas
────────────────────────────────── */
function renderLista(f) {
  const container = q('center-list');
  const empty     = q('list-empty');
  container.innerHTML = '';

  if (f.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  const municipios = f.filter(c => c.tipo === 'municipio');
  const hospitales = f.filter(c => c.tipo === 'hospital');
  const caps       = f.filter(c => c.tipo === 'caps');
  const oficinas   = f.filter(c => c.tipo === 'oficina');
  const seguridad  = f.filter(c => c.tipo === 'seguridad');

  if (municipios.length > 0) {
    container.appendChild(seccionLabel('Municipio'));
    municipios.forEach(c => container.appendChild(itemLista(c)));
  }
  if (hospitales.length > 0) {
    container.appendChild(seccionLabel('Hospitales'));
    hospitales.forEach(c => container.appendChild(itemLista(c)));
  }
  if (caps.length > 0) {
    container.appendChild(seccionLabel('Centros CAPS'));
    caps.forEach(c => container.appendChild(itemLista(c)));
  }
  if (oficinas.length > 0) {
    container.appendChild(seccionLabel('Oficinas Municipales'));
    oficinas.forEach(c => container.appendChild(itemLista(c)));
  }
  if (seguridad.length > 0) {
    container.appendChild(seccionLabel('Seguridad'));
    seguridad.forEach(c => container.appendChild(itemLista(c)));
  }
  const juzgados = f.filter(c => c.tipo === 'juzgado');
  if (juzgados.length > 0) {
    container.appendChild(seccionLabel('Juzgados'));
    juzgados.forEach(c => container.appendChild(itemLista(c)));
  }
  const cementerios = f.filter(c => c.tipo === 'cementerio');
  if (cementerios.length > 0) {
    container.appendChild(seccionLabel('Cementerio'));
    cementerios.forEach(c => container.appendChild(itemLista(c)));
  }
  const social = f.filter(c => c.tipo === 'social');
  if (social.length > 0) {
    container.appendChild(seccionLabel('Desarrollo Social'));
    social.forEach(c => container.appendChild(itemLista(c)));
  }
  const educacion = f.filter(c => c.tipo === 'educacion');
  if (educacion.length > 0) {
    container.appendChild(seccionLabel('Educación'));
    educacion.forEach(c => container.appendChild(itemLista(c)));
  }
}

function seccionLabel(txt) {
  const div = document.createElement('div');
  div.className = 'list-group-label';
  div.textContent = txt;
  return div;
}

/* ──────────────────────────────────
   MARCADORES EN EL MAPA
────────────────────────────────── */
function renderMarcadores(f) {
  if (!mapReady) return;
  const ids = new Set(f.map(c => c.id));

  /* Quitar los que ya no corresponden */
  Object.keys(markers).forEach(id => {
    if (!ids.has(id)) { markers[id].marker.remove(); delete markers[id]; }
  });

  /* Agregar los nuevos */
  f.forEach(c => { if (!markers[c.id]) crearMarcador(c); });
}

/* Marcador SVG animado — 2 anillos pulsantes + anillo estático + ícono interior */
function crearMarcador(c) {
  const esHosp = c.tipo === 'hospital';
  const esMuni = c.tipo === 'municipio';
  const esOfic = c.tipo === 'oficina';
  const esSeg  = c.tipo === 'seguridad';
  const esJuz  = c.tipo === 'juzgado';
  const esCem  = c.tipo === 'cementerio';
  const esSoc  = c.tipo === 'social';
  const color  = COL[c.tipo] || COL.caps;
  const size   = esMuni ? 46 : esHosp ? 42 : 36;
  const cx     = size / 2;

  const el = document.createElement('div');
  el.className = 'mwrap';
  el.title     = c.nombre;
  el.setAttribute('role', 'button');
  el.setAttribute('tabindex', '0');
  el.setAttribute('aria-label', c.nombre);

  /* Ícono interior: edificio para municipio, cruz para hospital, punto para CAPS */
  const inner = esMuni
    ? `<rect x="${cx-6}" y="${cx-1}" width="12" height="8" rx="1" fill="${color}25" stroke="${color}" stroke-width="1.2"/>
       <path d="${cx-2} ${cx+7}v-4h4v4" stroke="${color}" stroke-width="1.1" stroke-linecap="round"/>
       <path d="${cx} ${cx-8}l7 7h-14z" fill="${color}40" stroke="${color}" stroke-width="1.1" stroke-linejoin="round"/>`
    : `<circle cx="${cx}" cy="${cx}" r="3.5" fill="${color}"/>
       <circle cx="${cx-1}" cy="${cx-1}" r="1.2" fill="white" opacity=".4"/>`;

  el.innerHTML = esMuni
    ? `<svg width="24" height="30" viewBox="0 0 56 68" style="overflow:visible;filter:drop-shadow(0 3px 6px ${color}88)">
        <path d="M28 2C16 2 6 12 6 24c0 18 22 42 22 42s22-24 22-42C50 12 40 2 28 2z"
          fill="${color}" stroke="white" stroke-width="2"/>
        <rect x="19" y="26" width="18" height="11" rx="1" fill="white" opacity=".9"/>
        <path d="M22 37v-5h4v5M30 32h5v5" stroke="${color}" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M28 16l11 10H17z" fill="white" opacity=".9"/>
        <rect x="26" y="13" width="4" height="5" fill="white" opacity=".9"/>
        <polygon points="28,9 30.5,13 25.5,13" fill="white" opacity=".9"/>
      </svg>`
    : `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle class="pr"  cx="${cx}" cy="${cx}" r="${cx*0.6}"
        fill="none" stroke="${color}" stroke-width="1.5" opacity=".7"/>
      <circle class="pr2" cx="${cx}" cy="${cx}" r="${cx*0.6}"
        fill="none" stroke="${color}" stroke-width="1"   opacity=".4"/>
      <circle cx="${cx}" cy="${cx}" r="${cx*0.5}"
        fill="${color}18" stroke="${color}" stroke-width="1.2" opacity=".5"/>
      ${inner}
    </svg>`;

  el.addEventListener('click', e => { e.stopPropagation(); seleccionar(c.id, false); });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); seleccionar(c.id, false); }
  });

  const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([c.lng, c.lat])
    .addTo(map);

  markers[c.id] = { marker, el };
}


/* ──────────────────────────────────
   SELECCIÓN Y TARJETA
────────────────────────────────── */
function seleccionar(id, flyTo) {
  /* Desmarcar anterior */
  if (selectedId) {
    markers[selectedId]?.el.classList.remove('selected');
    document.querySelector(`.ci[data-id="${selectedId}"]`)?.classList.remove('active');
  }

  selectedId = id;
  const c = centros.find(x => x.id === id);
  if (!c) return;

  /* Marcar nuevo */
  markers[id]?.el.classList.add('selected');
  const item = document.querySelector(`.ci[data-id="${id}"]`);
  item?.classList.add('active');
  item?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

  if (flyTo) {
    map.flyTo({ center: [c.lng, c.lat], zoom: Math.max(map.getZoom(), 15.5), duration: 900, essential: true });
  }

  mostrarTarjeta(c);
}

function mostrarTarjeta(c) {
  const esHosp = c.tipo === 'hospital';
  const color  = COL[c.tipo];

  /* Encabezado */
  q('card-type-dot').style.background = color;
  q('card-type-lbl').textContent =
    c.tipo === 'municipio' ? 'Municipalidad' :
    c.tipo === 'oficina'   ? 'Oficina Municipal' :
    c.tipo === 'seguridad' ? 'Seguridad' :
    c.tipo === 'juzgado'    ? 'Juzgado' :
    c.tipo === 'cementerio' ? 'Cementerio Municipal' :
    c.tipo === 'social'     ? 'Desarrollo Social' :
    c.tipo === 'educacion'  ? 'Educación' :
    esHosp ? 'Hospital' : 'CAPS · Atención Primaria';
  q('card-type-lbl').style.color = color;

  q('card-name').textContent  = c.nombre;
  q('card-addr').textContent  = c.direccion;
  q('card-hours').textContent = c.horario;

  /* Estado: abierto / cerrado */
  const abierto = estaAbierto(c);
  const st = q('card-status');
  st.className = 'status-' + (abierto ? 'open' : 'closed');
  q('card-status-txt').textContent = abierto ? 'Abierto ahora' : 'Cerrado ahora';

  /* Servicios — primeros 5, separados por · */
  const max = 5;
  const svcs = c.servicios.slice(0, max).join(' · ');
  const extra = c.servicios.length > max ? ` · y ${c.servicios.length - max} más` : '';
  q('card-services-text').textContent = svcs + extra;

  /* Mostrar con animación */
  const card = q('card');
  card.classList.remove('vis');
  void card.offsetWidth; /* forzar reflow para reiniciar la animación */
  card.classList.add('vis');
}

function cerrarTarjeta() {
  q('card').classList.remove('vis');
  if (selectedId) {
    markers[selectedId]?.el.classList.remove('selected');
    document.querySelector(`.ci[data-id="${selectedId}"]`)?.classList.remove('active');
    selectedId = null;
  }
}

document.getElementById('card-close').addEventListener('click', cerrarTarjeta);


/* ──────────────────────────────────
   LÓGICA "ABIERTO AHORA"
────────────────────────────────── */
function estaAbierto(c) {
  if (c.guardia24h || c.diasHorario === '24h') return true;

  const now = new Date();
  const dow  = now.getDay(); // 0=Dom ... 6=Sáb
  const mins = now.getHours() * 60 + now.getMinutes();

  const esLV = dow >= 1 && dow <= 5;
  const esSab = dow === 6;

  if (c.diasHorario === 'L-V' && !esLV)          return false;
  if (c.diasHorario === 'L-S' && !esLV && !esSab) return false;

  const [dh, dm] = c.horarioDesde.split(':').map(Number);
  const [hh, hm] = c.horarioHasta.split(':').map(Number);

  return mins >= dh * 60 + dm && mins < hh * 60 + hm;
}

/* ──────────────────────────────────
   LÍMITE GEOGRÁFICO OFICIAL DE JCP
   Descarga el polígono desde OpenStreetMap (Nominatim, licencia ODbL).
   Lo dibuja en el canvas overlay para que no sea afectado por el filtro CSS del mapa.
────────────────────────────────── */
async function loadBoundaryJCP() {
  try {
    /* Usamos Overpass para obtener la relación administrativa oficial del Partido de JCP.
       admin_level=6 en Argentina corresponde al partido (municipio). */
    const query = `[out:json][timeout:25];
relation["name"="José C. Paz"]["admin_level"="6"];
out geom;`;

    const res  = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: query
    });
    const data = await res.json();

    if (!data.elements?.length) {
      console.warn('Límite JCP no encontrado en Overpass, intentando Nominatim…');
      return loadBoundaryJCPFallback();
    }

    /* Reconstruir el polígono a partir de los members de la relación */
    const rel = data.elements[0];
    if (!rel.members) return;

    /* Juntar los segmentos outer en una polilínea continua */
    const segments = rel.members
      .filter(m => m.type === 'way' && m.role === 'outer' && m.geometry)
      .map(m => m.geometry.map(p => [p.lon, p.lat]));

    if (!segments.length) return;

    /* Encadenar segmentos */
    const ring = segments[0].slice();
    const used = new Set([0]);
    for (let i = 1; i < segments.length; i++) {
      let added = false;
      for (const seg of segments) {
        if (used.has(segments.indexOf(seg))) continue;
        const last = ring[ring.length - 1];
        const sf = seg[0], sl = seg[seg.length - 1];
        if (Math.abs(sf[0]-last[0]) < 1e-6 && Math.abs(sf[1]-last[1]) < 1e-6) {
          ring.push(...seg.slice(1)); used.add(segments.indexOf(seg)); added = true; break;
        }
        if (Math.abs(sl[0]-last[0]) < 1e-6 && Math.abs(sl[1]-last[1]) < 1e-6) {
          ring.push(...seg.slice(0,-1).reverse()); used.add(segments.indexOf(seg)); added = true; break;
        }
      }
      if (!added) break;
    }

    jcpCoords = ring;
    updateBoundaryPixels();
    map.on('move', updateBoundaryPixels);
    map.on('zoom', updateBoundaryPixels);

  } catch (e) {
    console.warn('Overpass falló, intentando Nominatim:', e);
    loadBoundaryJCPFallback();
  }
}

async function loadBoundaryJCPFallback() {
  try {
    const url = 'https://nominatim.openstreetmap.org/search?' +
      new URLSearchParams({
        q: 'José C. Paz, Buenos Aires, Argentina',
        format: 'json',
        polygon_geojson: '1',
        limit: '1'
      });
    const res  = await fetch(url);
    const data = await res.json();
    if (!data[0]?.geojson) return;
    const geom = data[0].geojson;
    if (geom.type === 'Polygon') {
      jcpCoords = geom.coordinates[0];
    } else if (geom.type === 'MultiPolygon') {
      let best = null, maxLen = 0;
      geom.coordinates.forEach(p => { if (p[0].length > maxLen) { maxLen = p[0].length; best = p[0]; } });
      jcpCoords = best;
    }
    if (!jcpCoords) return;
    updateBoundaryPixels();
    map.on('move', updateBoundaryPixels);
    map.on('zoom', updateBoundaryPixels);
  } catch(e) {
    console.warn('Límite JCP no disponible:', e);
  }
}

/* Convierte las coordenadas geográficas [lng, lat] a píxeles del canvas overlay.
   Se llama al cargar y cada vez que el mapa se mueve o cambia de zoom. */
function updateBoundaryPixels() {
  if (!jcpCoords || !mapReady) return;
  jcpPx = jcpCoords.map(([lng, lat]) => {
    const p = map.project([lng, lat]);
    return [p.x, p.y];
  });
}


/* ──────────────────────────────────
   CANVAS OVERLAY — Scan lines + partículas
   Dos tipos de elemento:
   1) Beams: líneas largas que se mueven lentamente (horizontal/vertical)
   2) Dots:  puntos pequeños que pulsean y flotan
────────────────────────────────── */
(function initOverlay() {
  const cvs = document.getElementById('overlay');
  const ctx  = cvs.getContext('2d');
  let W = 0, H = 0;
  let beams = [], dots = [];

  /* Redimensionar canvas al tamaño del mapa.
     Usamos clientWidth del padre y diferimos con rAF para asegurarnos
     de que el flex layout esté calculado antes de leer las dimensiones. */
  function resize() {
    const p = cvs.parentElement;
    const w = p.clientWidth;
    const h = p.clientHeight;
    if (!w || !h) return;           /* layout aún no está listo, esperar */
    W = cvs.width  = w;
    H = cvs.height = h;
    beams = [];
    dots  = [];
    updateBoundaryPixels();         /* recalcular píxeles del límite JCP */
  }

  new ResizeObserver(resize).observe(cvs.parentElement);
  requestAnimationFrame(resize);   /* diferir al primer frame para que el layout esté completo */

  /* ─── Crear un beam (línea larga) ─── */
  function newBeam(randPos) {
    const horiz = Math.random() > 0.5;
    const fwd   = Math.random() > 0.5;           /* dirección de movimiento */
    const green = Math.random() > 0.42;
    const spd   = 0.15 + Math.random() * 0.55;   /* muy lento */
    const len   = (horiz ? W : H) * (0.28 + Math.random() * 0.52);
    const alpha = 0.07 + Math.random() * 0.22;
    const width = 0.5 + Math.random() * 1.4;
    const c     = green ? [0, 200, 120] : [60, 130, 255];

    let x, y, dx = 0, dy = 0;
    if (horiz) {
      x  = randPos ? Math.random() * W : (fwd ? -len / 2 : W + len / 2);
      y  = Math.random() * H;
      dx = fwd ? spd : -spd;
    } else {
      x  = Math.random() * W;
      y  = randPos ? Math.random() * H : (fwd ? -len / 2 : H + len / 2);
      dy = fwd ? spd : -spd;
    }

    return { horiz, x, y, dx, dy, len, alpha, width, c };
  }

  /* ─── Crear un dot (punto pulsante) ─── */
  function newDot() {
    const green = Math.random() > 0.42;
    return {
      x:  Math.random() * W,
      y:  Math.random() * H,
      vx: (Math.random() - 0.5) * 0.28,
      vy: (Math.random() - 0.5) * 0.28,
      r:  0.4 + Math.random() * 1.5,
      am: 0.06 + Math.random() * 0.28,
      c:  green ? '0,200,120' : '60,130,255',
      ph: Math.random() * Math.PI * 2,
      ps: 0.003 + Math.random() * 0.007
    };
  }

  /* ─── Dibujar un beam con gradiente y halo ─── */
  function drawBeam(b) {
    const [r, g, bl] = b.c;
    const x0 = b.horiz ? b.x - b.len / 2 : b.x;
    const y0 = b.horiz ? b.y             : b.y - b.len / 2;
    const x1 = b.horiz ? b.x + b.len / 2 : b.x;
    const y1 = b.horiz ? b.y             : b.y + b.len / 2;

    const grad = ctx.createLinearGradient(x0, y0, x1, y1);
    grad.addColorStop(0,    `rgba(${r},${g},${bl},0)`);
    grad.addColorStop(0.28, `rgba(${r},${g},${bl},${b.alpha})`);
    grad.addColorStop(0.72, `rgba(${r},${g},${bl},${b.alpha})`);
    grad.addColorStop(1,    `rgba(${r},${g},${bl},0)`);

    /* Halo exterior */
    ctx.beginPath();
    ctx.moveTo(x0, y0); ctx.lineTo(x1, y1);
    ctx.strokeStyle  = grad;
    ctx.lineWidth    = b.width * 6;
    ctx.globalAlpha  = 0.22;
    ctx.stroke();

    /* Línea central */
    ctx.lineWidth   = b.width;
    ctx.globalAlpha = 1;
    ctx.strokeStyle = grad;
    ctx.beginPath();
    ctx.moveTo(x0, y0); ctx.lineTo(x1, y1);
    ctx.stroke();
  }

  /* ─── Dibujar el límite de JCP en el canvas overlay ─── */
  function drawBoundary() {
    if (!jcpPx || jcpPx.length < 3) return;

    ctx.save();

    /* Sin máscara exterior — el polígono oficial de OSM no cubre exactamente
       todo el partido, lo que haría parecer que zonas reales de JCP están "afuera" */

    /* 2) Glow exterior del borde (halo verde suave) */
    ctx.beginPath();
    ctx.moveTo(jcpPx[0][0], jcpPx[0][1]);
    for (let i = 1; i < jcpPx.length; i++) ctx.lineTo(jcpPx[i][0], jcpPx[i][1]);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0, 200, 120, 0.22)';
    ctx.lineWidth   = 12;
    ctx.globalAlpha = 1;
    ctx.setLineDash([]);
    ctx.stroke();

    /* 3) Línea de borde punteada animada */
    ctx.beginPath();
    ctx.moveTo(jcpPx[0][0], jcpPx[0][1]);
    for (let i = 1; i < jcpPx.length; i++) ctx.lineTo(jcpPx[i][0], jcpPx[i][1]);
    ctx.closePath();
    ctx.setLineDash([9, 6]);
    ctx.lineDashOffset = -(Date.now() / 60) % 15;
    ctx.strokeStyle    = '#00c878';
    ctx.lineWidth      = 2.5;
    ctx.globalAlpha    = 0.95;
    ctx.stroke();

    /* 4) Label "PARTIDO DE JOSÉ C. PAZ" — centrado en la zona visible */
    ctx.setLineDash([]);
    ctx.globalAlpha = 0.55;
    ctx.font        = '600 11px Inter, sans-serif';
    ctx.fillStyle   = '#00c878';
    ctx.letterSpacing = '0.12em';
    const lbl = 'PARTIDO DE JOSÉ C. PAZ';
    const tw  = ctx.measureText(lbl).width;
    ctx.fillText(lbl, W / 2 - tw / 2, H * 0.96);

    ctx.restore();
  }

  /* ─── Loop de animación ─── */
  function loop() {
    ctx.clearRect(0, 0, W, H);

    /* Límite JCP — se dibuja primero (debajo de beams y partículas) */
    drawBoundary();

    /* Beams */
    for (let i = 0; i < beams.length; i++) {
      const b = beams[i];
      b.x += b.dx;
      b.y += b.dy;

      /* ¿Salió de los límites? → recrear */
      const half = b.len / 2;
      const out  = b.horiz
        ? (b.dx > 0 ? b.x - half > W : b.x + half < 0)
        : (b.dy > 0 ? b.y - half > H : b.y + half < 0);

      if (out) { beams[i] = newBeam(false); continue; }

      drawBeam(b);
    }

    /* Dots */
    for (const d of dots) {
      d.x  = (d.x + d.vx + W) % W;
      d.y  = (d.y + d.vy + H) % H;
      d.ph += d.ps;

      const a = Math.max(0, Math.sin(d.ph)) * d.am;
      if (a < 0.01) continue;

      /* Halo */
      ctx.globalAlpha = a * 0.18;
      ctx.fillStyle   = `rgba(${d.c},1)`;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r * 2.8, 0, Math.PI * 2);
      ctx.fill();

      /* Core */
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }

  loop();
})();


/* ══════════════════════════════════════════════════════════════
   MÓDULO DE NAVEGACIÓN
   GPS · Centro más cercano · Rutas OSRM (a pie y en auto)
   Sin redirecciones externas — todo ocurre dentro del mapa.
══════════════════════════════════════════════════════════════ */

/* ── Estado de navegación ── */
let userPos        = null;    // { lat, lng } posición actual del usuario
let userMarker     = null;    // instancia maplibregl.Marker
let watchId        = null;    // ID del watchPosition activo
let navDestino     = null;    // centro seleccionado como destino
let navModo        = 'foot';  // 'foot' | 'driving'
let pendingNavModo = null;    // modo pendiente hasta que el GPS esté listo
let notifTimer     = null;

const OSRM = 'https://router.project-osrm.org/route/v1';

/* ── Notificación temporal ── */
function notif(html, ms = 4000) {
  const el = q('notif');
  el.innerHTML = html;
  el.classList.add('vis');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('vis'), ms);
}

/* ── Modos del botón GPS: off → auto → manual → off ── */
let gpsMode = 'off'; // 'off' | 'auto' | 'manual'
let manualActive = false;

q('gps-btn').addEventListener('click', () => {
  if (gpsMode === 'off') {
    gpsMode = 'auto';
    solicitarGPS();
  } else if (gpsMode === 'auto') {
    detenerGPS();
    gpsMode = 'manual';
    activarModoManual();
  } else {
    desactivarModoManual();
    gpsMode = 'off';
  }
});

function activarModoManual() {
  manualActive = true;
  q('gps-btn').classList.remove('active', 'searching');
  q('gps-btn').classList.add('manual');
  q('map-wrap').classList.add('manual-mode');
  q('manual-banner').classList.add('vis');
  notif('📍 Tocá el mapa para fijar tu ubicación', 99999);
}

function desactivarModoManual() {
  manualActive = false;
  q('gps-btn').classList.remove('manual');
  q('map-wrap').classList.remove('manual-mode');
  q('manual-banner').classList.remove('vis');
  q('notif').classList.remove('vis');
  userMarker?.remove(); userMarker = null; userPos = null;
  limpiarRuta();
}

/* Clic en el mapa: si modo manual, fijar ubicación ahí */
map.on('click', e => {
  if (manualActive) {
    const { lng, lat } = e.lngLat;
    userPos = { lat, lng };
    colocarMarcadorUsuario(userPos);
    mostrarCentroMasCercano();
    desactivarModoManual();
    gpsMode = 'off';
    q('gps-btn').classList.add('active');
    notif('✅ Ubicación fijada manualmente', 3000);
    return;
  }
  cerrarTarjeta();
});

function solicitarGPS() {
  if (!('geolocation' in navigator)) {
    notif('⚠ Tu navegador no soporta geolocalización.');
    return;
  }
  q('gps-btn').classList.add('searching');
  notif('📡 Buscando tu ubicación…', 8000);

  navigator.geolocation.getCurrentPosition(
    pos => onPosOk(pos),
    err => {
      q('gps-btn').classList.remove('searching');
      const msgs = {
        1: '🔒 Permiso de ubicación denegado. Podés buscar tu dirección manualmente.',
        2: '📡 No se pudo obtener la ubicación. Verificá tu señal GPS.',
        3: '⏱ Tiempo agotado buscando ubicación.'
      };
      notif(msgs[err.code] || '⚠ Error de geolocalización.', 6000);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function onPosOk(pos) {
  userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
  q('gps-btn').classList.remove('searching');
  q('gps-btn').classList.add('active');

  colocarMarcadorUsuario(userPos);
  mostrarCentroMasCercano();

  /* Si el usuario había pedido una ruta antes de que el GPS estuviera listo → calcularla ahora */
  if (pendingNavModo) {
    const modo  = pendingNavModo;
    pendingNavModo = null;
    /* Usar el centro actualmente seleccionado como destino si navDestino es null */
    if (!navDestino && selectedId) {
      navDestino = centros.find(c => c.id === selectedId) || null;
    }
    if (navDestino) calcularRuta(navDestino, modo);
  }

  /* Seguimiento continuo */
  watchId = navigator.geolocation.watchPosition(
    p => {
      userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
      userMarker?.setLngLat([userPos.lng, userPos.lat]);
    },
    null,
    { enableHighAccuracy: true, maximumAge: 5000 }
  );
}

function detenerGPS() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  userMarker?.remove(); userMarker = null; userPos = null;
  q('gps-btn').classList.remove('active', 'searching');
  limpiarRuta();
  notif('📍 Ubicación desactivada.');
}

/* ── Marcador del usuario (punto azul animado) ── */
function colocarMarcadorUsuario({ lat, lng }) {
  if (userMarker) { userMarker.setLngLat([lng, lat]); return; }

  const el = document.createElement('div');
  el.className = 'mwrap';
  el.innerHTML = `
    <svg width="38" height="38" viewBox="0 0 38 38">
      <circle class="pr"  cx="19" cy="19" r="12" fill="none" stroke="#3c82ff" stroke-width="1.5" opacity=".7"/>
      <circle class="pr2" cx="19" cy="19" r="12" fill="none" stroke="#3c82ff" stroke-width="1"   opacity=".4"/>
      <circle cx="19" cy="19" r="8"  fill="rgba(60,130,255,0.18)" stroke="#3c82ff" stroke-width="1.5"/>
      <circle cx="19" cy="19" r="4.5" fill="#3c82ff"/>
      <circle cx="17" cy="17" r="1.5" fill="white" opacity=".55"/>
    </svg>`;

  userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lng, lat])
    .addTo(map);

  map.flyTo({ center: [lng, lat], zoom: Math.max(map.getZoom(), 13), duration: 1100, essential: true });
}

/* ── Distancia haversine en metros ── */
function distanciaM(a, b) {
  const R   = 6371000;
  const φ1  = a.lat * Math.PI / 180;
  const φ2  = b.lat * Math.PI / 180;
  const Δφ  = (b.lat - a.lat) * Math.PI / 180;
  const Δλ  = (b.lng - a.lng) * Math.PI / 180;
  const s   = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

/* ── Centro más cercano ── */
function mostrarCentroMasCercano() {
  if (!userPos || centros.length === 0) return;

  const ranking = centros
    .map(c => ({ ...c, dist: distanciaM(userPos, { lat: c.lat, lng: c.lng }) }))
    .sort((a, b) => a.dist - b.dist);

  const p = ranking[0];
  const km  = p.dist < 1000 ? `${Math.round(p.dist)} m` : `${(p.dist/1000).toFixed(1)} km`;
  const min = Math.round(p.dist / 80); // ~80 m/min caminando

  notif(
    `📍 <strong>${htmlEsc(p.nombre)}</strong> — ${km} · ~${min} min caminando`,
    7000
  );
}

/* ══════════════════════════════════════════════════════════════
   OSRM ROUTING
   Perfiles: foot (a pie) · driving (en auto)
   API pública, sin API key, sin redireccionamiento externo.
══════════════════════════════════════════════════════════════ */

async function calcularRuta(destino, modo = 'foot') {
  /* Si el GPS todavía no está listo: guardar el modo pedido y pedir el GPS.
     La ruta se calculará automáticamente en onPosOk cuando el permiso sea concedido. */
  if (!userPos) {
    pendingNavModo = modo;
    notif('📡 Activando ubicación… el recorrido empezará automáticamente.');
    solicitarGPS();
    return;
  }

  navDestino = destino;
  navModo    = modo;

  /* Mostrar estado de carga */
  q('nav-duration').textContent = 'Calculando…';
  q('nav-meta').textContent     = '';
  q('nav-steps').innerHTML      = '';
  q('nav-panel').classList.add('vis');

  /* Resaltar tab activo */
  q('tab-walk').className  = 'nav-tab' + (modo === 'foot'    ? ' on-walk'  : '');
  q('tab-drive').className = 'nav-tab' + (modo === 'driving' ? ' on-drive' : '');
  q('nav-mode-icon').textContent = modo === 'foot' ? '🚶' : '🚗';

  const origin = `${userPos.lng},${userPos.lat}`;
  const dest   = `${destino.lng},${destino.lat}`;
  const url    = `${OSRM}/${modo}/${origin};${dest}` +
                 `?overview=full&geometries=geojson&steps=true&annotations=false`;

  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (data.code !== 'Ok' || !data.routes?.length) {
      throw new Error('Sin ruta disponible');
    }

    const ruta   = data.routes[0];
    const distM  = Math.round(ruta.distance);
    const durMin = Math.round(ruta.duration / 60);
    const color   = modo === 'foot' ? '#00c878' : '#3c82ff';
    const distTxt = distM < 1000 ? `${distM} m` : `${(distM/1000).toFixed(1)} km`;

    /* 1. Actualizar panel de resumen (primero, independiente del mapa) */
    q('nav-duration').textContent = `${durMin} min`;
    q('nav-meta').textContent     = `${distTxt} · hacia ${destino.nombre}`;
    q('nav-steps').innerHTML      = extraerPasos(ruta.legs[0]?.steps || [], modo, color);

    /* 2. Dibujar en mapa (puede fallar si el mapa aún no está listo → ignorar silenciosamente) */
    try {
      dibujarCapaRuta(ruta.geometry, modo, color);

      /* Encuadrar la ruta */
      const coords = ruta.geometry.coordinates;
      const lngs   = coords.map(c => c[0]);
      const lats   = coords.map(c => c[1]);
      map.fitBounds(
        [[Math.min(...lngs), Math.min(...lats)], [Math.max(...lngs), Math.max(...lats)]],
        { padding: { top: 60, bottom: 180, left: 20, right: 20 }, duration: 900 }
      );
    } catch (_) { /* mapa no listo — el panel de info ya se mostró */ }

  } catch (e) {
    q('nav-panel').classList.remove('vis');
    notif(`⚠ No se pudo calcular la ruta: ${e.message}`, 5000);
  }
}

/* ── Construir HTML de los pasos de la ruta ── */
function extraerPasos(steps, modo, color) {
  const clsStep = modo === 'foot' ? 'step-walk' : 'step-drive';
  const icoMap  = {
    'turn-left':       '↰', 'turn-right':      '↱',
    'turn-slight-left':'↙', 'turn-slight-right':'↘',
    'continue':        '↑', 'depart':           '🏁',
    'arrive':          '📍', 'roundabout':      '🔄',
    'merge':           '↗', 'fork':             '⑂',
  };

  return steps
    .filter(s => s.maneuver?.type !== 'depart' || steps.indexOf(s) === 0)
    .map(s => {
      const tipo  = s.maneuver?.type || 'continue';
      const mod   = s.maneuver?.modifier || '';
      const key   = tipo === 'turn' ? `turn-${mod}` : tipo;
      const ico   = icoMap[key] || '↑';
      const name  = s.name && s.name !== '' ? `por <strong>${htmlEsc(s.name)}</strong>` : '';
      const distM = Math.round(s.distance);
      const distT = distM < 1000 ? `${distM} m` : `${(distM/1000).toFixed(1)} km`;

      if (distM < 5) return ''; // ignorar pasos de 0 metros

      return `
        <div class="step ${clsStep}">
          <span class="step-ico">${ico}</span>
          <div>
            <div class="step-txt">
              ${tipo === 'arrive' ? '📍 Llegás a ' + htmlEsc(navDestino?.nombre || 'destino') : `Seguí ${name}`}
            </div>
            <div class="step-meta">${distT}</div>
          </div>
        </div>`;
    })
    .join('');
}

/* ── Capas de ruta en MapLibre ── */
function dibujarCapaRuta(geometry, modo, color) {
  limpiarRuta();

  map.addSource('ruta', { type: 'geojson', data: { type: 'Feature', geometry } });

  /* Halo exterior */
  map.addLayer({
    id: 'ruta-halo', type: 'line', source: 'ruta',
    paint: { 'line-color': color, 'line-width': 14, 'line-opacity': 0.16, 'line-blur': 6 }
  });

  /* Línea principal */
  map.addLayer({
    id: 'ruta', type: 'line', source: 'ruta',
    layout: { 'line-join': 'round', 'line-cap': 'round' },
    paint: {
      'line-color':     color,
      'line-width':     4.5,
      'line-opacity':   0.95,
      'line-dasharray': modo === 'foot' ? [2, 3] : [1]
    }
  });
}

function limpiarRuta() {
  if (!map.loaded()) return;
  ['ruta-halo', 'ruta'].forEach(id => {
    try { if (map.getLayer(id))  map.removeLayer(id);  } catch(_) {}
    try { if (map.getSource(id)) map.removeSource(id); } catch(_) {}
  });
}

/* ── Eventos de los tabs y cierre del panel ── */
q('tab-walk').addEventListener('click',  () => { if (navDestino) calcularRuta(navDestino, 'foot');    });
q('tab-drive').addEventListener('click', () => { if (navDestino) calcularRuta(navDestino, 'driving'); });

q('nav-close').addEventListener('click', () => {
  q('nav-panel').classList.remove('vis');
  limpiarRuta();
  navDestino = null;
  /* Resetear tabs */
  q('tab-walk').className  = 'nav-tab';
  q('tab-drive').className = 'nav-tab';
  /* Desmarcar botones activos en la tarjeta */
  q('card-walk')?.classList.remove('active');
  q('card-drive')?.classList.remove('active');
});

/* ── Botones de la tarjeta flotante ── */
function navBtnClick(modo) {
  /* Resolver destino: navDestino > centro seleccionado actualmente */
  if (!navDestino && selectedId) {
    navDestino = centros.find(c => c.id === selectedId) || null;
  }
  if (!navDestino) {
    notif('⚠ Seleccioná un centro primero.');
    return;
  }
  q('card-walk').classList.toggle('active',  modo === 'foot');
  q('card-drive').classList.toggle('active', modo === 'driving');
  calcularRuta(navDestino, modo);
}

q('card-walk').addEventListener('click',  () => navBtnClick('foot'));
q('card-drive').addEventListener('click', () => navBtnClick('driving'));

/* Parchear seleccionar() para capturar el destino sin depender del override de mostrarTarjeta */
const _seleccionarOrig = seleccionar;
seleccionar = function(id, fly) {
  _seleccionarOrig(id, fly);
  navDestino = centros.find(c => c.id === id) || null;
  q('card-walk')?.classList.remove('active');
  q('card-drive')?.classList.remove('active');
};

/* Cuando se cierra la tarjeta, limpiar ruta también */
document.getElementById('card-close').addEventListener('click', () => {
  q('nav-panel').classList.remove('vis');
  limpiarRuta();
  navDestino     = null;
  pendingNavModo = null;
  q('tab-walk').className  = 'nav-tab';
  q('tab-drive').className = 'nav-tab';
}, true); /* capture:true para correr antes del handler original */

/* ── Iniciar GPS automáticamente si ya hay permiso guardado ── */
navigator.permissions?.query({ name: 'geolocation' }).then(r => {
  if (r.state === 'granted') solicitarGPS();
});

/* ──────────────────────────────────
   UTILIDADES
────────────────────────────────── */
function q(id) { return document.getElementById(id); }

/* ── Modo día / noche ── */
const DARK_TILES  = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png';
const LIGHT_TILES = 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}@2x.png';
const DARK_FILTER  = 'sepia(1) hue-rotate(195deg) saturate(2.6) brightness(1.05) contrast(1.05)';
const LIGHT_FILTER = 'none';

const ICO_LUNA = `<path d="M13.5 10.5A6 6 0 0 1 5.5 2.5a6 6 0 1 0 8 8z" fill="currentColor"/>`;
const ICO_SOL  = `<circle cx="8" cy="8" r="3" fill="currentColor"/>
  <line x1="8" y1="1" x2="8" y2="3"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="13" x2="8" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1" y1="8" x2="3" y2="8"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3"  y1="3"  x2="4.5" y2="4.5"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="11.5" y1="11.5" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="3"  x2="11.5" y2="4.5"  stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4.5" y1="11.5" x2="3" y2="13"   stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`;

let isDark = true;

q('theme-btn').addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? '' : 'light');

  /* Cambiar tiles del mapa */
  const servers = ['a','b','c'];
  const tileUrl = isDark ? DARK_TILES : LIGHT_TILES;
  const tiles   = servers.map(s => tileUrl.replace('{s}', s));
  map.getSource('carto').setTiles(tiles);

  /* Cambiar filtro CSS del canvas del mapa */
  map.getCanvas().style.filter = isDark ? DARK_FILTER : LIGHT_FILTER;

  /* Cambiar ícono del botón */
  q('theme-ico').innerHTML = isDark ? ICO_LUNA : ICO_SOL;
});

/* ── Toggle sidebar ── */
q('sidebar-toggle').addEventListener('click', () => {
  const sidebar = q('sidebar');
  const btn     = q('sidebar-toggle');
  const collapsed = sidebar.classList.toggle('collapsed');
  btn.classList.toggle('collapsed', collapsed);
  btn.style.left = collapsed ? '0' : 'var(--sidebar-w)';
  /* Forzar resize del mapa para que ocupe el nuevo ancho */
  setTimeout(() => map.resize(), 260);
});

function htmlEsc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(s)));
  return d.innerHTML;
}
</script>
